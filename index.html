<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Tarifit Vergelijker</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=IBM+Plex+Mono:wght@400;500&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Syne',system-ui,sans-serif;background:#0f0f0f;color:#f0ece4;height:100vh;display:flex;flex-direction:column;overflow:hidden}
a,button{font-family:inherit}

#topbar{background:#111;border-bottom:1px solid #2a2a2a;padding:.55rem 1rem;display:flex;align-items:center;gap:.6rem;flex-wrap:wrap;flex-shrink:0}
.logo{font-size:.95rem;font-weight:800;letter-spacing:-.02em}
.logo span{color:#d4875a}
.progw{flex:1;min-width:80px;display:flex;align-items:center;gap:.35rem}
.progt{flex:1;height:3px;background:#2a2a2a;border-radius:2px;overflow:hidden}
.progf{height:100%;background:linear-gradient(90deg,#d4875a,#5a9ed4);transition:width .3s}
.progl{font-size:.62rem;color:#666;font-family:'IBM Plex Mono',monospace;white-space:nowrap}
.btn{padding:.25rem .6rem;border-radius:4px;border:1px solid #2a2a2a;cursor:pointer;font-size:.7rem;font-weight:600;background:#222;color:#666;transition:.1s}
.btn:hover{border-color:#d4875a;color:#d4875a}
.btn.pri{background:#d4875a;color:#000;border-color:#d4875a}
.btn.pri:hover{background:#c4774a}

#fbar{background:#181818;border-bottom:1px solid #2a2a2a;padding:.35rem 1rem;display:flex;gap:.35rem;align-items:center;flex-wrap:wrap;flex-shrink:0}
.flbl{font-size:.6rem;color:#666;font-weight:700;text-transform:uppercase;letter-spacing:.06em;white-space:nowrap}
.chip{padding:.2rem .5rem;border-radius:3px;border:1px solid #2a2a2a;background:transparent;color:#555;font-size:.68rem;font-weight:600;cursor:pointer;transition:.1s;font-family:'Syne',sans-serif}
.chip:hover{color:#f0ece4;border-color:#444}
.chip.on{background:#f0ece4;color:#000;border-color:#f0ece4}
.chip.onA{background:#d4875a;color:#000;border-color:#d4875a}
.chip.onB{background:#5a9ed4;color:#000;border-color:#5a9ed4}
.chip.onBoth{background:#8abe6e;color:#000;border-color:#8abe6e}
.vsep{width:1px;height:14px;background:#2a2a2a;flex-shrink:0}
#srch{margin-left:auto;position:relative}
#srch input{padding:.25rem .55rem .25rem 1.5rem;border:1px solid #2a2a2a;border-radius:4px;font-family:'IBM Plex Mono',monospace;font-size:.72rem;background:#222;color:#f0ece4;outline:none;width:170px}
#srch input:focus{border-color:#d4875a}
#srch::before{content:"⌕";position:absolute;left:.35rem;top:50%;transform:translateY(-50%);color:#555;pointer-events:none;font-size:.9rem}

#statbar{background:#181818;border-bottom:1px solid #2a2a2a;padding:.28rem 1rem;display:flex;gap:.8rem;flex-shrink:0;flex-wrap:wrap}
.si{display:flex;align-items:center;gap:.25rem;font-size:.72rem}
.sdot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.sn{font-weight:700}
.sl{color:#666;font-size:.65rem}

#wrap{display:flex;flex:1;overflow:hidden}

#lp{width:255px;flex-shrink:0;background:#181818;border-right:1px solid #2a2a2a;display:flex;flex-direction:column;overflow:hidden}
#lph{padding:.35rem .7rem;border-bottom:1px solid #2a2a2a;font-size:.58rem;color:#666;font-weight:700;text-transform:uppercase;letter-spacing:.06em;display:flex;justify-content:space-between;background:#1a1a1a;flex-shrink:0}
#gl{flex:1;overflow-y:auto}
#gl::-webkit-scrollbar{width:3px}
#gl::-webkit-scrollbar-thumb{background:#2a2a2a}
.gi{display:flex;align-items:center;gap:.35rem;padding:.35rem .7rem;cursor:pointer;border-left:2px solid transparent;border-bottom:1px solid #0f0f0f;transition:.07s}
.gi:hover{background:#1e1e1e}
.gi.active{background:#1e180e;border-left-color:#d4875a}
.gnm{flex:1;font-size:.73rem;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.gbe{font-size:.6rem;color:#555;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:75px;font-family:'IBM Plex Mono',monospace}
.stag{font-size:.52rem;padding:.06rem .22rem;border-radius:2px;font-weight:700;flex-shrink:0}
.stag.A{background:rgba(212,135,90,.15);color:#d4875a}
.stag.B{background:rgba(90,158,212,.15);color:#5a9ed4}
.stag.AB{background:rgba(138,190,110,.15);color:#8abe6e}
.gck{font-size:.68rem;flex-shrink:0;color:#333}
.gi.done .gck{color:#8abe6e}

#dp{flex:1;overflow-y:auto;padding:1rem}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:.5rem;color:#555}
.empty .ico{font-size:2.2rem}

.card{background:#181818;border:1px solid #2a2a2a;border-radius:8px;overflow:hidden;max-width:760px;margin:0 auto}
.chdr{padding:.9rem 1.2rem .7rem;background:#1a1a1a;border-bottom:1px solid #2a2a2a}
.crow{display:flex;align-items:flex-start;justify-content:space-between;gap:.5rem;margin-bottom:.45rem}
.clbl{font-size:.56rem;color:#666;text-transform:uppercase;letter-spacing:.07em;font-weight:700;margin-bottom:.2rem}
.cnl{font-size:1.3rem;font-weight:800;letter-spacing:-.02em;line-height:1.2}
.badges{display:flex;gap:.22rem;flex-wrap:wrap}
.badge{padding:.13rem .4rem;border-radius:3px;font-size:.6rem;font-family:'IBM Plex Mono',monospace;font-weight:500}
.badge.A{background:rgba(212,135,90,.12);color:#d4875a;border:1px solid rgba(212,135,90,.25)}
.badge.B{background:rgba(90,158,212,.12);color:#5a9ed4;border:1px solid rgba(90,158,212,.25)}
.badge.AB{background:rgba(138,190,110,.12);color:#8abe6e;border:1px solid rgba(138,190,110,.25)}
.badge.ok{background:rgba(138,190,110,.1);color:#8abe6e;border:1px solid rgba(138,190,110,.25)}

.okbar{padding:.45rem 1.2rem;background:rgba(138,190,110,.06);border-bottom:1px solid rgba(138,190,110,.12);display:flex;align-items:center;gap:.5rem}
.okber{font-family:'IBM Plex Mono',monospace;font-size:.82rem;font-weight:500}
.oknl{font-size:.68rem;color:#666}

.cols{display:grid;grid-template-columns:1fr 1fr}
.cols.single{grid-template-columns:1fr}
.col{padding:.9rem 1.2rem;border-right:1px solid #2a2a2a}
.col:last-child{border-right:none}
.clhdr{font-size:.58rem;text-transform:uppercase;letter-spacing:.07em;font-weight:700;margin-bottom:.6rem;display:flex;align-items:center;gap:.3rem}
.clhdr.A{color:#d4875a}
.clhdr.B{color:#5a9ed4}
.clhdr::after{content:'';flex:1;height:1px;background:#2a2a2a}

.opt{display:flex;align-items:center;gap:.55rem;padding:.55rem .75rem;border:1.5px solid #2a2a2a;border-radius:5px;cursor:pointer;transition:.1s;background:#0f0f0f;margin-bottom:.3rem}
.opt:hover{border-color:#d4875a;background:#170e06}
.opt.sel{border-color:#d4875a;background:#170e06;box-shadow:0 0 0 2px rgba(212,135,90,.15)}
.opt.kbd{border-color:#5a9ed4;box-shadow:0 0 0 2px rgba(90,158,212,.2)}
.opt input{width:13px;height:13px;accent-color:#d4875a;flex-shrink:0;pointer-events:none}
.ober{font-family:'IBM Plex Mono',monospace;font-size:.85rem;line-height:1.3;word-break:break-word}
.onl{font-size:.63rem;color:#555;margin-top:.1rem}

.actbar{padding:.75rem 1.2rem;border-top:1px solid #2a2a2a;display:flex;align-items:center;gap:.4rem;background:#1a1a1a}
.nav{margin-left:auto;display:flex;gap:.3rem}

.mylist{padding:1rem;max-width:760px;margin:0 auto}
.mylist h2{font-size:1rem;font-weight:800;margin-bottom:.8rem}
.mitem{display:flex;align-items:center;gap:.5rem;padding:.4rem .65rem;border:1px solid #2a2a2a;border-radius:4px;margin-bottom:.25rem;background:#0f0f0f}
.mber{font-family:'IBM Plex Mono',monospace;font-size:.82rem;flex:1}
.mnl{font-size:.7rem;color:#555;min-width:130px}
.mdel{background:none;border:none;cursor:pointer;color:#444;padding:.12rem .3rem;border-radius:3px;font-size:.78rem}
.mdel:hover{color:#e05555;background:#2a1515}
</style>
</head>

<div id="topbar">
  <div class="logo">Tarifit <span>Vergelijker</span></div>
  <div class="progw"><div class="progt"><div class="progf" id="pf" style="width:0%"></div></div><div class="progl" id="pl">0 / 0</div></div>

</div>
<div id="statbar">

  <div class="si"><div class="sdot" style="background:#5a9ed4"></div><span class="sn" id="stBB">0</span><span class="sl">lijst B</span></div>
  <div class="si"><div class="sdot" style="background:#e8c96e"></div><span class="sn" id="stOK">0</span><span class="sl">goedgekeurd</span></div>
</div>
<div id="wrap">

    <div id="lph"><span>Woorden</span><span id="lc">0</span></div>
    <div id="gl"></div>
  </div>
  <div id="dp"><div class="empty"><div class="ico">🔤</div><p>Selecteer een woord links</p></div></div>
</div>

var st={approved:{},filter:'all',sort:'nl',search:'',cur:null,optIdx:0};

function loadSt(){try{var s=localStorage.getItem('trft2');if(s){var p=JSON.parse(s);st.approved=p.approved||{};}}catch(e){}}
function saveSt(){try{localStorage.setItem('trft2',JSON.stringify({approved:st.approved}));}catch(e){}}
loadSt();

function h(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function filtered(){
  var d=DATA.slice();
  var f=st.filter;
  if(f==='both') d=d.filter(function(g){return g.multi;});
  else if(f==='A') d=d.filter(function(g){return g.sources.indexOf('A')>=0;});
  else if(f==='B') d=d.filter(function(g){return g.sources.indexOf('B')>=0;});
  else if(f==='todo') d=d.filter(function(g){return !st.approved[g.id];});
  var q=st.search.toLowerCase();
  if(q){d=d.filter(function(g){
    if(g.display_nl.toLowerCase().indexOf(q)>=0) return true;
    for(var i=0;i<g.entries.length;i++){if(g.entries[i].ber.toLowerCase().indexOf(q)>=0||g.entries[i].nl.toLowerCase().indexOf(q)>=0) return true;}
    return false;
  });}
  if(st.sort==='ber'){d.sort(function(a,b){var ab=(a.entries[0]?a.entries[0].ber:'').toLowerCase();var bb=(b.entries[0]?b.entries[0].ber:'').toLowerCase();return ab<bb?-1:ab>bb?1:0;});}
  return d;
}

function updStats(){
  var done=Object.keys(st.approved).length;
  document.getElementById('stT').textContent=DATA.length;
  document.getElementById('stB').textContent=DATA.filter(function(d){return d.multi;}).length;
  document.getElementById('stA').textContent=DATA.filter(function(d){return d.sources==='A';}).length;
  document.getElementById('stBB').textContent=DATA.filter(function(d){return d.sources==='B';}).length;
  document.getElementById('stOK').textContent=done;
  document.getElementById('mc').textContent=done;
  var pct=DATA.length?Math.round(done/DATA.length*100):0;
  document.getElementById('pf').style.width=pct+'%';
  document.getElementById('pl').textContent=done+' / '+DATA.length;
}

function renderList(){
  var d=filtered();
  document.getElementById('lc').textContent=d.length;
  var hasCurrent=false;
  for(var j=0;j<d.length;j++){
    if(d[j].id===st.cur){hasCurrent=true;break;}
  }
  if(!hasCurrent) st.cur=d.length?d[0].id:null;
  var gl=document.getElementById('gl');
  var html='';
  for(var i=0;i<d.length;i++){
    var g=d[i];
    var done=!!st.approved[g.id];
    var sc=g.multi?'AB':(g.sources.indexOf('A')>=0?'A':'B');
    var sl=g.multi?'A+B':(g.sources.indexOf('A')>=0?'A':'B');
    var be=g.entries[0]?g.entries[0].ber:'';
    var act=(st.cur===g.id)?' active':'';
    var dn=done?' done':'';
    html+='<div class="gi'+act+dn+'" data-gid="'+g.id+'">';
    html+='<span class="gck">'+(done?'✓':'·')+'</span>';
    html+='<div style="flex:1;min-width:0"><div class="gnm">'+h(g.display_nl)+'</div><div class="gbe">'+h(be)+'</div></div>';
    html+='<span class="stag '+sc+'">'+sl+'</span>';
    html+='</div>';
  }
  gl.innerHTML=html;
  if(st.cur!==null) renderCard(st.cur);
  updStats();
}

function getGroupById(id){
  for(var i=0;i<DATA.length;i++){if(DATA[i].id===id) return DATA[i];}
  return null;
}

function optionsForGroup(g){
  if(!g) return [];
  if(g.multi){
    var aE=[],bE=[];
    for(var i=0;i<g.entries.length;i++){if(g.entries[i].src==='A') aE.push(g.entries[i]); else bE.push(g.entries[i]);}
    return aE.concat(bE);
  }
  return g.entries.slice();
}

function optHtml(e,gid,approved,idx){
  var sel=(approved&&approved.ber===e.ber&&approved.nl===e.nl)?'sel':'';
  var kbd=(st.cur===gid&&st.optIdx===idx)?'kbd':'';
  return '<div class="opt '+sel+' '+kbd+'" data-gid="'+gid+'" data-idx="'+idx+'" data-ber="'+h(e.ber)+'" data-nl="'+h(e.nl)+'">'
    +'<input type="radio" '+(sel||kbd?'checked="checked"':'')+'>'
    +'<div><div class="ober">'+h(e.ber)+'</div><div class="onl">'+h(e.nl)+'</div></div>'
    +'</div>';
}

function renderCard(id){
  var g=getGroupById(id);
  if(!g) return;
  var approved=st.approved[g.id]||null;
  var sc=g.multi?'AB':(g.sources.indexOf('A')>=0?'A':'B');
  var sl=g.multi?'Beide lijsten':'Lijst '+(g.sources.indexOf('A')>=0?'A':'B');
  var aE=[],bE=[];
  for(var i=0;i<g.entries.length;i++){if(g.entries[i].src==='A') aE.push(g.entries[i]); else bE.push(g.entries[i]);}
  var allOptions=optionsForGroup(g);
  if(!allOptions.length) st.optIdx=0;
  else if(st.optIdx>=allOptions.length) st.optIdx=allOptions.length-1;
  if(approved){
    for(var ai=0;ai<allOptions.length;ai++){
      if(allOptions[ai].ber===approved.ber&&allOptions[ai].nl===approved.nl){st.optIdx=ai;break;}
    }
  }
  
  var okbar='';
  if(approved){okbar='<div class="okbar"><span style="font-size:.7rem;color:#8abe6e;font-weight:600">✓ Goedgekeurd:</span><span class="okber">'+h(approved.ber)+'</span><span class="oknl">'+h(approved.nl)+'</span></div>';}
  
  var colHtml='';
  if(g.multi){
    var aH='',bH='';
    for(var i=0;i<aE.length;i++) aH+=optHtml(aE[i],g.id,approved,i);
    for(var i=0;i<bE.length;i++) bH+=optHtml(bE[i],g.id,approved,aE.length+i);
    colHtml='<div class="cols"><div class="col"><div class="clhdr A">Lijst A</div>'+aH+'</div><div class="col"><div class="clhdr B">Lijst B</div>'+bH+'</div></div>';
  } else {
    var src=aE.length?'A':'B';
    var all=g.entries;
    var allH='';
    for(var i=0;i<all.length;i++) allH+=optHtml(all[i],g.id,approved,i);
    colHtml='<div class="cols single"><div class="col"><div class="clhdr '+src+'">Lijst '+src+'</div>'+allH+'</div></div>';
  }
  
  var d=filtered();
  var idx=-1;
  for(var i=0;i<d.length;i++){if(d[i].id===id){idx=i;break;}}
  var prevId=(idx>0)?d[idx-1].id:null;
  var nextId=(idx<d.length-1)?d[idx+1].id:null;
  
  var unBtn=approved?'<button class="btn" data-unapprove="'+g.id+'">✕ Goedkeuring verwijderen</button>':'<button class="btn" disabled>← Kies een woord</button>';
  
  document.getElementById('dp').innerHTML=
    '<div class="card">'
    +'<div class="chdr"><div class="crow"><div><div class="clbl">Nederlands</div><div class="cnl">'+h(g.display_nl)+'</div></div>'
    +'<div class="badges"><span class="badge '+sc+'">'+sl+'</span>'+(approved?'<span class="badge ok">✓ OK</span>':'')+'</div></div></div>'
    +okbar+colHtml
    +'<div class="actbar">'+unBtn
    +'<button class="btn" data-custom="'+g.id+'">+ Eigen woord</button>'
    +'<div class="nav">'
    +(prevId!==null?'<button class="btn" data-nav="'+prevId+'">← Vorige</button>':'<button class="btn" disabled>← Vorige</button>')
    +(nextId!==null?'<button class="btn pri" data-nav="'+nextId+'">Volgende →</button>':'<button class="btn pri" disabled>Volgende →</button>')
    +'</div></div></div>';
}

function selectItem(id){
  st.cur=id;
  st.optIdx=0;
  var els=document.getElementById('gl').querySelectorAll('.gi');
  for(var i=0;i<els.length;i++){
    var gid=parseInt(els[i].getAttribute('data-gid'));
    els[i].classList.toggle('active',gid===id);
  }
  renderCard(id);
  var active=document.querySelector('.gi.active');
  if(active) active.scrollIntoView({block:'nearest'});
}

function approve(gid,ber,nl){
  st.approved[gid]={ber:ber,nl:nl};
  saveSt();
  updStats();
  var el=document.querySelector('.gi[data-gid="'+gid+'"]');
  if(el){el.classList.add('done');el.querySelector('.gck').textContent='✓';}
  renderCard(gid);
}

function unapprove(gid){
  delete st.approved[gid];
  saveSt();
  updStats();
  var el=document.querySelector('.gi[data-gid="'+gid+'"]');
  if(el){el.classList.remove('done');el.querySelector('.gck').textContent='·';}
  renderCard(gid);
}

document.getElementById('gl').addEventListener('click',function(e){
  var gi=e.target.closest('.gi');
  if(gi) selectItem(parseInt(gi.getAttribute('data-gid')));
});

document.getElementById('dp').addEventListener('click',function(e){
  var opt=e.target.closest('.opt[data-ber]');
  if(opt){
    st.optIdx=parseInt(opt.getAttribute('data-idx'))||0;
    approve(parseInt(opt.getAttribute('data-gid')),opt.getAttribute('data-ber'),opt.getAttribute('data-nl'));
    return;
  }
  var ua=e.target.closest('[data-unapprove]');
  if(ua){unapprove(parseInt(ua.getAttribute('data-unapprove')));return;}
  var nav=e.target.closest('[data-nav]');
  if(nav){selectItem(parseInt(nav.getAttribute('data-nav')));return;}
  var cu=e.target.closest('[data-custom]');
  if(cu){
    var ber=prompt('Berbers woord:');
    if(!ber||!ber.trim()) return;
    var gid=parseInt(cu.getAttribute('data-custom'));
    var g=null;for(var i=0;i<DATA.length;i++){if(DATA[i].id===gid){g=DATA[i];break;}}
    if(g) approve(gid,ber.trim(),g.display_nl);
  }
});

document.addEventListener('keydown',function(e){
  var t=e.target;
  if(t&&(t.tagName==='INPUT'||t.tagName==='TEXTAREA'||t.tagName==='SELECT'||t.isContentEditable)) return;
  if(st.cur===null) return;
  var d=filtered();
  var idx=-1;
  for(var i=0;i<d.length;i++){if(d[i].id===st.cur){idx=i;break;}}
  if(idx<0) return;
  var g=getGroupById(st.cur);
  var opts=optionsForGroup(g);
  if(e.key==='ArrowLeft'&&idx>0){e.preventDefault();selectItem(d[idx-1].id);return;}
  if(e.key==='ArrowRight'&&idx<d.length-1){e.preventDefault();selectItem(d[idx+1].id);return;}
  if(e.key==='ArrowUp'&&opts.length){e.preventDefault();st.optIdx=st.optIdx>0?st.optIdx-1:0;renderCard(st.cur);return;}
  if(e.key==='ArrowDown'&&opts.length){e.preventDefault();st.optIdx=st.optIdx<opts.length-1?st.optIdx+1:opts.length-1;renderCard(st.cur);return;}
  if(e.key==='Enter'&&opts.length){
    e.preventDefault();
    var pick=opts[st.optIdx]||opts[0];
    approve(st.cur,pick.ber,pick.nl);
    if(idx<d.length-1) selectItem(d[idx+1].id);
  }
});

document.getElementById('fAll').onclick=function(){setFilter('all');};
document.getElementById('fBoth').onclick=function(){setFilter('both');};
document.getElementById('fA').onclick=function(){setFilter('A');};
document.getElementById('fB').onclick=function(){setFilter('B');};
document.getElementById('fTodo').onclick=function(){setFilter('todo');};
document.getElementById('sNL').onclick=function(){setSort('nl');};
document.getElementById('sBer').onclick=function(){setSort('ber');};

function setFilter(f){
  st.filter=f;st.cur=null;
  ['fAll','fBoth','fA','fB','fTodo'].forEach(function(id){document.getElementById(id).className='chip';});
  var map={all:'fAll',both:'fBoth',A:'fA',B:'fB',todo:'fTodo'};
  var cls=f==='A'?'onA':f==='B'?'onB':f==='both'?'onBoth':'on';
  document.getElementById(map[f]).className='chip '+cls;
  document.getElementById('dp').innerHTML='<div class="empty"><div class="ico">🔤</div><p>Selecteer een woord links</p></div>';
  renderList();
}

function setSort(s){
  st.sort=s;
  document.getElementById('sNL').className='chip'+(s==='nl'?' on':'');
  document.getElementById('sBer').className='chip'+(s==='ber'?' on':'');
  renderList();
}

var searchTimer;
document.getElementById('sq').oninput=function(e){
  clearTimeout(searchTimer);
  searchTimer=setTimeout(function(){st.search=e.target.value;renderList();},150);
};

document.getElementById('btnMy').onclick=function(){
  document.getElementById('lp').style.display='flex';
  var entries=Object.keys(st.approved);
  if(!entries.length){document.getElementById('dp').innerHTML='<div class="empty"><div class="ico">⭐</div><p>Nog geen woorden goedgekeurd</p></div>';return;}
  var items=entries.map(function(id){
    var g=null;for(var i=0;i<DATA.length;i++){if(DATA[i].id===parseInt(id)){g=DATA[i];break;}}
    return {id:parseInt(id),ber:st.approved[id].ber,nl:st.approved[id].nl,key:g?g.key:''};
  }).filter(function(x){return x.key;}).sort(function(a,b){return a.key<b.key?-1:a.key>b.key?1:0;});
  var html='<div class="mylist"><h2>Mijn goedgekeurde lijst ('+items.length+')</h2>';
  items.forEach(function(item){
    html+='<div class="mitem"><div class="mber">'+h(item.ber)+'</div><div class="mnl">'+h(item.nl)+'</div><button class="mdel" data-mid="'+item.id+'">✕</button></div>';
  });
  html+='</div>';
  document.getElementById('dp').innerHTML=html;
};

document.getElementById('dp').addEventListener('click',function(e){
  var mb=e.target.closest('[data-mid]');
  if(mb){unapprove(parseInt(mb.getAttribute('data-mid')));document.getElementById('btnMy').onclick();}
});

document.getElementById('btnExp').onclick=function(){
  var entries=Object.keys(st.approved);
  if(!entries.length){alert('Nog geen woorden goedgekeurd!');return;}
  var items=entries.map(function(id){
    var g=null;for(var i=0;i<DATA.length;i++){if(DATA[i].id===parseInt(id)){g=DATA[i];break;}}
    return {ber:st.approved[id].ber,nl:st.approved[id].nl,key:g?g.key:''};
  }).sort(function(a,b){return a.key<b.key?-1:a.key>b.key?1:0;});
  var csv='Berbers,Nederlands\r\n';
  items.forEach(function(item){csv+='"'+item.ber.replace(/"/g,'""')+'","'+item.nl.replace(/"/g,'""')+'"\r\n';});
  var blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
  var a=document.createElement('a');
  a.href=URL.createObjectURL(blob);a.download='tarifit_mijn_lijst.csv';
  document.body.appendChild(a);a.click();document.body.removeChild(a);
};

renderList();
updStats();
</script>
