<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Tarifit Lijstbouwer</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
:root{
  --bg:#f7f3ee;--surf:#fff;--surf2:#f0ebe3;--bord:#e0d8cc;
  --ink:#1c1612;--mut:#8a7d6e;
  --terr:#c05c28;--terrl:#fdf0e8;
  --teal:#1e6e62;--teall:#e6f4f1;
  --gold:#b87d2a;--goldl:#fdf5e6;
  --purp:#6b4fa0;--purpl:#f3effc;
  --grn:#2e7d32;--grnl:#e8f5e9;
  --A:#1e6e62;--B:#c05c28;--C:#6b4fa0;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Outfit',system-ui,sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;display:flex;flex-direction:column}

/* TOPBAR */
.topbar{background:var(--ink);color:#fff;display:flex;align-items:center;gap:1rem;padding:.6rem 1.2rem;flex-wrap:wrap;position:sticky;top:0;z-index:200;box-shadow:0 2px 12px rgba(0,0,0,.25)}
.t-title{font-size:1rem;font-weight:700;color:#fff;white-space:nowrap}
.t-title span{color:#c8a87a}
.prog-wrap{flex:1;min-width:160px;display:flex;align-items:center;gap:.6rem}
.prog-track{flex:1;height:5px;background:rgba(255,255,255,.15);border-radius:3px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,#c8a87a,#c05c28);border-radius:3px;transition:width .4s}
.prog-lbl{font-size:.72rem;color:#c8a87a;font-family:'JetBrains Mono',monospace;white-space:nowrap}
.tbtn{padding:.35rem .8rem;border-radius:5px;border:none;cursor:pointer;font-family:'Outfit',sans-serif;font-size:.78rem;font-weight:500;transition:all .15s;white-space:nowrap}
.tbtn-g{background:rgba(255,255,255,.1);color:#fff;border:1px solid rgba(255,255,255,.2)}
.tbtn-g:hover{background:rgba(255,255,255,.2)}
.tbtn-exp{background:var(--gold);color:#fff}
.tbtn-exp:hover{background:#9a6620}
.lct{background:var(--grn);color:#fff;border-radius:4px;padding:.1rem .4rem;font-size:.7rem;font-family:'JetBrains Mono',monospace;font-weight:700;margin-left:.2rem}

/* FILTERBAR */
.fbar{background:var(--surf);border-bottom:1px solid var(--bord);padding:.5rem 1.2rem;display:flex;gap:.5rem;align-items:center;flex-wrap:wrap;position:sticky;top:44px;z-index:190}
.flbl{font-size:.72rem;color:var(--mut);font-weight:600;white-space:nowrap}
.chip{padding:.28rem .65rem;border-radius:20px;border:1.5px solid var(--bord);background:#fff;color:var(--mut);font-size:.75rem;font-weight:500;cursor:pointer;transition:all .12s;font-family:'Outfit',sans-serif}
.chip:hover{border-color:var(--terr);color:var(--terr)}
.chip.on{background:var(--terr);color:#fff;border-color:var(--terr)}
.chip.on3{background:var(--grn);color:#fff;border-color:var(--grn)}
.chip.on2{background:var(--gold);color:#fff;border-color:var(--gold)}
.chip.onP{background:var(--teal);color:#fff;border-color:var(--teal)}
.fsep{width:1px;height:18px;background:var(--bord);flex-shrink:0}
.srch{position:relative;margin-left:auto}
.srch input{padding:.3rem .7rem .3rem 1.8rem;border:1.5px solid var(--bord);border-radius:5px;font-family:'Outfit',sans-serif;font-size:.8rem;outline:none;width:180px;transition:border-color .15s}
.srch input:focus{border-color:var(--terr)}
.srch::before{content:"⌕";position:absolute;left:.45rem;top:50%;transform:translateY(-50%);color:var(--mut);font-size:.95rem;pointer-events:none}

/* STATS */
.stats{background:var(--surf);border-bottom:1px solid var(--bord);padding:.4rem 1.2rem;display:flex;gap:1.2rem;flex-wrap:wrap}
.si{display:flex;align-items:center;gap:.3rem}
.sn{font-size:.95rem;font-weight:700}
.sl{font-size:.72rem;color:var(--mut)}

/* MAIN LAYOUT */
.main{display:flex;flex:1;min-height:0}

/* LIST PANEL */
.lpanel{width:290px;flex-shrink:0;background:var(--surf);border-right:1px solid var(--bord);display:flex;flex-direction:column;height:calc(100vh - 114px);position:sticky;top:114px;overflow:hidden}
.lph{padding:.5rem .9rem;border-bottom:1px solid var(--bord);font-size:.68rem;color:var(--mut);font-weight:700;text-transform:uppercase;letter-spacing:.06em;display:flex;justify-content:space-between;background:var(--surf2);flex-shrink:0}
.glist{flex:1;overflow-y:auto;padding:.25rem 0}
.glist::-webkit-scrollbar{width:3px}
.glist::-webkit-scrollbar-thumb{background:var(--bord);border-radius:2px}
.gi{display:flex;align-items:center;gap:.55rem;padding:.5rem .9rem;cursor:pointer;border-left:3px solid transparent;transition:all .1s;border-bottom:1px solid var(--bg)}
.gi:hover{background:var(--surf2)}
.gi.active{background:var(--terrl);border-left-color:var(--terr)}
.gi.done{opacity:.55}
.gi.skipped{opacity:.35}
.gi-name{flex:1;font-size:.85rem;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.gi-sub{font-size:.7rem;color:var(--mut);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:90px}
.pips{display:flex;gap:2px;flex-shrink:0}
.pip{width:7px;height:7px;border-radius:50%;background:var(--bord)}
.pip.A{background:var(--A)}.pip.B{background:var(--B)}.pip.C{background:var(--C)}
.stic{font-size:.78rem;width:16px;text-align:center;flex-shrink:0}

/* DETAIL PANEL */
.dpanel{flex:1;padding:1.4rem;overflow-y:auto;min-width:0}

/* CARD */
.card{background:var(--surf);border-radius:12px;border:1px solid var(--bord);overflow:hidden;max-width:860px;margin:0 auto;box-shadow:0 2px 16px rgba(0,0,0,.07)}

/* CARD HEADER - Dutch word */
.chdr{padding:1.3rem 1.6rem 1rem;background:var(--surf2);border-bottom:1px solid var(--bord)}
.chdr-top{display:flex;align-items:flex-start;justify-content:space-between;gap:1rem;flex-wrap:wrap;margin-bottom:.8rem}
.cdlbl{font-size:.68rem;color:var(--mut);text-transform:uppercase;letter-spacing:.08em;font-weight:700;margin-bottom:.4rem}
.cdword{font-size:1.6rem;font-weight:700;color:var(--ink);line-height:1.2}
.sbadges{display:flex;gap:.35rem;flex-wrap:wrap;align-items:flex-start;padding-top:.2rem}
.sbadge{display:flex;align-items:center;gap:.25rem;padding:.2rem .55rem;border-radius:4px;font-size:.68rem;font-family:'JetBrains Mono',monospace;font-weight:500;border:1px solid transparent;white-space:nowrap}
.sbadge.A{background:var(--teall);color:var(--A);border-color:rgba(30,110,98,.2)}
.sbadge.B{background:var(--terrl);color:var(--B);border-color:rgba(192,92,40,.2)}
.sbadge.C{background:var(--purpl);color:var(--C);border-color:rgba(107,79,160,.2)}

/* TWO-COLUMN PICKER */
.picker-grid{display:grid;grid-template-columns:1fr 1fr;gap:0;border-top:1px solid var(--bord)}
.picker-col{padding:1.4rem 1.6rem;border-right:1px solid var(--bord)}
.picker-col:last-child{border-right:none}
.picker-lbl{font-size:.7rem;text-transform:uppercase;letter-spacing:.08em;font-weight:700;color:var(--mut);margin-bottom:.9rem;display:flex;align-items:center;gap:.4rem}
.picker-lbl::after{content:'';flex:1;height:1px;background:var(--bord)}

/* OPTION ROWS */
.opt-row{display:flex;align-items:center;gap:.85rem;padding:.85rem 1rem;border:2px solid var(--bord);border-radius:8px;cursor:pointer;transition:all .13s;background:#fff;margin-bottom:.5rem;min-height:62px}
.opt-row:hover{border-color:var(--terr);background:var(--terrl)}
.opt-row.sel{border-color:var(--terr);background:var(--terrl);box-shadow:0 0 0 3px rgba(192,92,40,.1)}
.opt-row input[type=radio]{width:18px;height:18px;accent-color:var(--terr);flex-shrink:0;pointer-events:none;cursor:pointer}
.opt-main{flex:1;min-width:0}
.opt-word{font-family:'JetBrains Mono',monospace;font-size:1.05rem;font-weight:500;color:var(--ink);line-height:1.3;word-break:break-word}
.opt-sub{font-size:.72rem;color:var(--mut);font-style:italic;margin-top:.15rem;line-height:1.3}
.opt-badge{flex-shrink:0}
.opt-src{font-size:.68rem;padding:.2rem .45rem;border-radius:4px;font-family:'JetBrains Mono',monospace;font-weight:600}
.opt-src.A{background:var(--teall);color:var(--A)}
.opt-src.B{background:var(--terrl);color:var(--B)}
.opt-src.C{background:var(--purpl);color:var(--C)}

/* CUSTOM ROW */
.cust-row{display:flex;align-items:center;gap:.85rem;padding:.75rem 1rem;border:2px dashed var(--bord);border-radius:8px;cursor:pointer;background:#fff;transition:all .13s;min-height:54px}
.cust-row:hover{border-color:var(--terr)}
.cust-row.sel{border-style:solid;border-color:var(--terr);background:var(--terrl)}
.cust-row input[type=radio]{width:18px;height:18px;accent-color:var(--terr);flex-shrink:0;pointer-events:none}
.cust-input{flex:1;border:1.5px solid var(--bord);border-radius:6px;padding:.5rem .75rem;font-size:.95rem;outline:none;transition:border-color .15s;font-family:'JetBrains Mono',monospace;background:#fff}
.cust-input:focus{border-color:var(--terr)}
.cust-input::placeholder{color:#bbb;font-style:italic;font-family:'Outfit',sans-serif}
.cust-label{font-size:.78rem;color:var(--mut);white-space:nowrap;font-weight:500}

/* ADD OWN WORD PANEL */
.add-own{margin:1rem 1.6rem 1.4rem;padding:1.1rem 1.3rem;background:var(--grnl);border:1.5px dashed rgba(46,125,50,.3);border-radius:8px}
.add-own-lbl{font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--grn);margin-bottom:.8rem;display:flex;align-items:center;gap:.5rem}
.add-own-fields{display:grid;grid-template-columns:1fr 1fr;gap:.7rem}
.field-wrap{display:flex;flex-direction:column;gap:.3rem}
.field-lbl{font-size:.72rem;font-weight:600;color:var(--mut);text-transform:uppercase;letter-spacing:.05em}
.field-inp{padding:.6rem .8rem;border:1.5px solid var(--bord);border-radius:6px;font-size:.95rem;outline:none;transition:border-color .15s;font-family:'JetBrains Mono',monospace;background:#fff;width:100%}
.field-inp:focus{border-color:var(--grn)}
.field-inp.dutch-inp{font-family:'Outfit',sans-serif}
.add-own-btn{margin-top:.8rem;width:100%;padding:.65rem;background:var(--grn);color:#fff;border:none;border-radius:7px;font-family:'Outfit',sans-serif;font-size:.9rem;font-weight:600;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:.4rem}
.add-own-btn:hover{background:#1b5e20;transform:translateY(-1px)}
.add-own-btn:disabled{background:#ccc;cursor:not-allowed;transform:none}

/* CARD ACTIONS */
.cacts{display:flex;gap:.6rem;flex-wrap:wrap;padding:1rem 1.6rem;background:var(--surf2);border-top:1px solid var(--bord);align-items:center}
.btn{padding:.6rem 1.3rem;border-radius:7px;border:none;cursor:pointer;font-family:'Outfit',sans-serif;font-size:.88rem;font-weight:600;transition:all .15s;display:flex;align-items:center;gap:.35rem}
.btn-add{background:var(--terr);color:#fff;flex:1;justify-content:center}
.btn-add:hover{background:#a04820;transform:translateY(-1px);box-shadow:0 3px 10px rgba(192,92,40,.3)}
.btn-add:disabled{background:#ccc;cursor:not-allowed;transform:none;box-shadow:none}
.btn-skip{background:var(--surf);color:var(--mut);border:1.5px solid var(--bord)}
.btn-skip:hover{background:var(--surf2);border-color:var(--mut)}
.btn-nav{background:var(--surf);color:var(--ink);border:1.5px solid var(--bord);padding:.6rem .9rem}
.btn-nav:hover{background:var(--surf2)}
.nhint{font-size:.72rem;color:var(--mut);margin-left:auto}

/* EMPTY STATE */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:400px;color:var(--mut);gap:.7rem;font-size:.9rem}
.empty .ic{font-size:2.5rem}

/* MODAL */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;align-items:center;justify-content:center}
.overlay.open{display:flex}
.modal{background:#fff;border-radius:12px;padding:1.8rem;max-width:520px;width:92%;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.modal h2{font-size:1.2rem;margin-bottom:.3rem}
.modal .sub{color:var(--mut);font-size:.85rem;margin-bottom:1rem}
.prev{max-height:200px;overflow-y:auto;border:1px solid var(--bord);border-radius:6px;padding:.4rem;margin-bottom:1rem;font-family:'JetBrains Mono',monospace;font-size:.75rem;background:var(--surf2)}
.pr{display:flex;gap:.8rem;padding:.22rem .3rem;border-radius:3px}
.pr:hover{background:var(--bord)}
.prt{color:var(--terr);font-weight:500;min-width:140px}
.prd{color:var(--ink)}
.exopts{display:flex;gap:.6rem;margin-bottom:1.2rem;flex-wrap:wrap}
.exbtn{flex:1;min-width:110px;padding:.8rem;border:2px solid var(--bord);border-radius:8px;cursor:pointer;background:#fff;text-align:center;transition:all .12s;font-family:'Outfit',sans-serif}
.exbtn:hover{border-color:var(--terr);background:var(--terrl)}
.exbtn .ei{font-size:1.3rem;margin-bottom:.2rem}
.exbtn .el{font-weight:600;font-size:.85rem}
.exbtn .ed{font-size:.7rem;color:var(--mut)}
.mcls{width:100%;padding:.5rem;border:1.5px solid var(--bord);border-radius:7px;background:#fff;cursor:pointer;font-family:'Outfit',sans-serif;font-size:.85rem;color:var(--mut)}
.mcls:hover{background:var(--surf2)}

mark{background:#ffdd57;border-radius:2px;padding:0 1px}
.toast{position:fixed;bottom:1.2rem;right:1.2rem;background:var(--ink);color:#fff;padding:.6rem 1rem;border-radius:8px;font-size:.82rem;font-weight:500;box-shadow:0 4px 20px rgba(0,0,0,.25);z-index:999;opacity:0;transform:translateY(8px);transition:all .25s;pointer-events:none}
.toast.show{opacity:1;transform:translateY(0)}
@media(max-width:700px){.lpanel{display:none}.picker-grid{grid-template-columns:1fr}.add-own-fields{grid-template-columns:1fr}}
</style>
</head>
<body>

<div class="topbar">
  <div class="t-title">⵿ <span>Tarifit</span> Lijstbouwer</div>
  <div class="prog-wrap">
    <div class="prog-track"><div class="prog-fill" id="pFill" style="width:0%"></div></div>
    <div class="prog-lbl" id="pLbl">0 / 0</div>
  </div>
  <button class="tbtn tbtn-g" onclick="openExport()">📋 Mijn lijst <span class="lct" id="lCt">0</span></button>
  <button class="tbtn tbtn-g" onclick="doReset()" title="Reset voortgang">↺</button>
  <button class="tbtn tbtn-exp" onclick="openExport()">⬇ Exporteer</button>
</div>

<div class="fbar">
  <span class="flbl">Filter:</span>
  <button class="chip on" data-f="all">Alles</button>
  <button class="chip" data-f="3">🟢 Alle 3</button>
  <button class="chip" data-f="2">🟠 2 lijsten</button>
  <button class="chip" data-f="1">◻ Slechts 1</button>
  <div class="fsep"></div>
  <button class="chip" data-f="pending">⏳ Nog te doen</button>
  <button class="chip" data-f="done">✓ Gedaan</button>
  <button class="chip" data-f="skipped">⊘ Overgeslagen</button>
  <div class="srch"><input id="sInp" type="text" placeholder="Zoek…" autocomplete="off" spellcheck="false"></div>
</div>

<div class="stats">
  <div class="si"><span class="sn" id="stT">—</span><span class="sl">groepen</span></div>
  <div class="si"><span class="sn" id="stD" style="color:var(--grn)">0</span><span class="sl">toegevoegd</span></div>
  <div class="si"><span class="sn" id="stS" style="color:var(--mut)">0</span><span class="sl">overgeslagen</span></div>
  <div class="si"><span class="sn" id="stP" style="color:var(--terr)">—</span><span class="sl">nog te doen</span></div>
  <div class="si"><span class="sn" style="color:var(--grn)">243</span><span class="sl">in 3 lijsten</span></div>
  <div class="si"><span class="sn" style="color:var(--gold)">413</span><span class="sl">in 2 lijsten</span></div>
</div>

<div class="main">
  <div class="lpanel">
    <div class="lph"><span id="lpCt">—</span><span id="lpF">alles</span></div>
    <div class="glist" id="gList"></div>
  </div>
  <div class="dpanel" id="dPanel">
    <div class="empty" id="emptyState">
      <div class="ic">📚</div>
      <div>Selecteer een woord links</div>
      <div style="font-size:.78rem;color:var(--mut)">↑↓ pijltjes of zoekbalk</div>
    </div>
    <div id="cardWrap" style="display:none"></div>
  </div>
</div>

<div class="overlay" id="expModal">
  <div class="modal" style="max-width:600px;width:95%">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.3rem">
      <h2>📋 Mijn lijst</h2>
      <button class="mcls" onclick="closeExport()" style="width:auto;padding:.3rem .8rem;font-size:.85rem">✕ Sluiten</button>
    </div>
    <div class="sub" id="expSub">—</div>
    <div id="expPrev" style="max-height:340px;overflow-y:auto;border:1px solid var(--bord);border-radius:8px;margin-bottom:1rem;background:var(--surf2)"></div>
    <div class="exopts">
      <div class="exbtn" id="exCsv"><div class="ei">📄</div><div class="el">CSV</div><div class="ed">Excel / Numbers</div></div>
      <div class="exbtn" id="exAnki"><div class="ei">🎴</div><div class="el">Anki</div><div class="ed">Tab-gescheiden</div></div>
      <div class="exbtn" id="exJson"><div class="ei">{ }</div><div class="el">JSON</div><div class="ed">Volledige data</div></div>
    </div>
  </div>
</div>
<style>
.list-row{display:flex;align-items:center;gap:.6rem;padding:.5rem .8rem;border-bottom:1px solid var(--bord);transition:background .1s}
.list-row:last-child{border-bottom:none}
.list-row:hover{background:rgba(0,0,0,.03)}
.list-num{font-size:.68rem;color:var(--mut);font-family:"JetBrains Mono",monospace;width:28px;text-align:right;flex-shrink:0}
.list-t{font-family:"JetBrains Mono",monospace;font-size:.88rem;font-weight:500;color:var(--terr);min-width:120px;flex-shrink:0}
.list-d{font-size:.85rem;color:var(--ink);flex:1}
.list-tag{font-size:.62rem;background:var(--grnl);color:var(--grn);border-radius:3px;padding:.1rem .35rem;flex-shrink:0;font-weight:600}
.list-del{width:26px;height:26px;border-radius:5px;border:none;background:transparent;color:#bbb;cursor:pointer;font-size:.9rem;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
.list-del:hover{background:#fee2e2;color:#c62828}
.list-empty{padding:2rem;text-align:center;color:var(--mut);font-size:.88rem;font-style:italic}
</style>

const SK='tarifit_lb_v4';
let st={c:{},my:[]};
let cf='all',sq='',cid=null,fg=[];

function ls(){try{const s=localStorage.getItem(SK);if(s){st=JSON.parse(s);if(!st.c)st.c={};if(!st.my)st.my=[];}}catch(e){st={c:{},my:[]};}}
function ss(){try{localStorage.setItem(SK,JSON.stringify(st));}catch(e){}}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function hl(t,q){
  if(!q)return esc(t);
  const re=new RegExp('('+q.replace(/[.+?^${}()|[\]\\]/g,'\\$&')+')','gi');
  return esc(t).replace(re,'<mark>$1</mark>');
}

function gf(){
  let g=D;
  if(cf==='3')g=g.filter(x=>x.sc===3);
  else if(cf==='2')g=g.filter(x=>x.sc===2);
  else if(cf==='1')g=g.filter(x=>x.sc===1);
  else if(cf==='done')g=g.filter(x=>st.c[x.id]?.s==='done');
  else if(cf==='skipped')g=g.filter(x=>st.c[x.id]?.s==='skip');
  else if(cf==='pending')g=g.filter(x=>!st.c[x.id]);
  if(sq.trim()){
    const q=sq.trim().toLowerCase();
    g=g.filter(x=>x.key.includes(q)||x.bd.toLowerCase().includes(q)||x.e.some(e=>e.t.toLowerCase().includes(q)||e.d.toLowerCase().includes(q)));
  }
  return g;
}

function upStats(){
  const tot=D.length;
  const done=Object.values(st.c).filter(c=>c.s==='done').length;
  const skip=Object.values(st.c).filter(c=>c.s==='skip').length;
  const myLen=st.my.length;
  document.getElementById('stT').textContent=tot;
  document.getElementById('stD').textContent=myLen;
  document.getElementById('stS').textContent=skip;
  document.getElementById('stP').textContent=tot-done-skip;
  document.getElementById('lCt').textContent=myLen;
  const pct=tot>0?(done+skip)/tot*100:0;
  document.getElementById('pFill').style.width=pct+'%';
  document.getElementById('pLbl').textContent=(done+skip)+' / '+tot;
}

function renderList(){
  fg=gf();
  const el=document.getElementById('gList');
  document.getElementById('lpCt').textContent=fg.length+' groepen';
  document.getElementById('lpF').textContent=cf==='all'?'alles':cf;
  const q=sq.trim();
  let h='';
  for(const g of fg){
    const ch=st.c[g.id];
    const status=ch?.s||'pend';
    const si=status==='done'?'✓':status==='skip'?'⊘':'';
    const sc2=status==='done'?' done':status==='skip'?' skipped':'';
    const ia=g.id===cid?' active':'';
    const pA=g.srcs.includes('A')?'A':'';
    const pB=g.srcs.includes('B')?'B':'';
    const pC=g.srcs.includes('C')?'C':'';
    let sub=status==='done'?ch.t:(g.e.length>0?g.e[0].t:'');
    h+='<div class="gi'+sc2+ia+'" data-id="'+g.id+'">';
    h+='<div class="pips"><span class="pip '+pA+'"></span><span class="pip '+pB+'"></span><span class="pip '+pC+'"></span></div>';
    h+='<div style="flex:1;min-width:0"><div class="gi-name">'+hl(g.bd,q)+'</div><div class="gi-sub">'+esc(sub)+'</div></div>';
    h+='<div class="stic">'+si+'</div></div>';
  }
  el.innerHTML=h||'<div style="padding:1.5rem;text-align:center;color:var(--mut);font-size:.82rem">Geen resultaten</div>';
}

document.getElementById('gList').addEventListener('click',function(e){
  const item=e.target.closest('.gi');
  if(item)selGroup(parseInt(item.dataset.id));
});

function selGroup(id){
  cid=id;
  const g=D.find(x=>x.id===id);
  if(!g)return;
  document.getElementById('emptyState').style.display='none';
  document.getElementById('cardWrap').style.display='';
  const ch=st.c[id];
  const selT=ch?.s==='done'?ch.t:(g.e.length>0?g.e[0].t:'');
  const selD=ch?.s==='done'?ch.d:g.bd;
  const isCustomT=selT&&!g.e.find(e=>e.t===selT);
  const isCustomD=selD&&!g.dv.includes(selD);
  const dvars=g.dv.filter((v,i,a)=>a.indexOf(v)===i);
  const snames={A:'Woordenlijst',B:'Tarifit Berber NL',C:'Berbers Lijst'};
  const idx=fg.findIndex(x=>x.id===id);

  let h='<div class="card">';

  // ── HEADER: source badges only ──
  h+='<div class="chdr">';
  h+='<div class="chdr-top">';
  h+='<div><div class="cdlbl">Concept</div><div class="cdword">'+esc(g.bd)+'</div></div>';
  h+='<div class="sbadges">';
  for(const s of['A','B','C']){
    if(g.srcs.includes(s))h+='<span class="sbadge '+s+'">'+s+' — '+snames[s]+'</span>';
  }
  h+='</div></div></div>';

  // ── TWO-COLUMN PICKER ──
  h+='<div class="picker-grid">';

  // LEFT: Tarifit (Berbers) picker
  h+='<div class="picker-col">';
  h+='<div class="picker-lbl">⵿ Berbers schrijfwijze</div>';
  for(const e of g.e){
    const isSel=!isCustomT&&e.t===selT;
    h+='<div class="opt-row'+(isSel?' sel':'')+'" data-col="T" data-val="'+esc(e.t)+'">';
    h+='<input type="radio" name="pick-T"'+(isSel?' checked':'')+' readonly>';
    h+='<div class="opt-main"><div class="opt-word">'+esc(e.t)+'</div>';
    if(e.ex)h+='<div class="opt-sub">'+esc(e.ex)+(e.pl?' · mv: '+e.pl:'')+'</div>';
    h+='</div>';
    h+='<div class="opt-badge"><span class="opt-src '+e.s+'">'+e.s+'</span></div></div>';
  }
  // Custom Tarifit
  h+='<div class="cust-row'+(isCustomT?' sel':'')+'" data-col="T" data-val="__custom__">';
  h+='<input type="radio" name="pick-T"'+(isCustomT?' checked':'')+' readonly>';
  h+='<span class="cust-label">Eigen:</span>';
  h+='<input type="text" class="cust-input" id="custT" placeholder="Typ Berbers woord…" value="'+esc(isCustomT?selT:'')+'">';
  h+='</div></div>';

  // RIGHT: Dutch picker
  h+='<div class="picker-col">';
  h+='<div class="picker-lbl">🇳🇱 Nederlandse betekenis</div>';
  for(const v of dvars){
    const isSel=!isCustomD&&v===selD;
    h+='<div class="opt-row'+(isSel?' sel':'')+'" data-col="D" data-val="'+esc(v)+'">';
    h+='<input type="radio" name="pick-D"'+(isSel?' checked':'')+' readonly>';
    h+='<div class="opt-main"><div class="opt-word" style="font-family:Outfit,sans-serif;font-size:1rem">'+esc(v)+'</div></div>';
    h+='</div>';
  }
  // Custom Dutch
  h+='<div class="cust-row'+(isCustomD?' sel':'')+'" data-col="D" data-val="__custom__">';
  h+='<input type="radio" name="pick-D"'+(isCustomD?' checked':'')+' readonly>';
  h+='<span class="cust-label">Eigen:</span>';
  h+='<input type="text" class="cust-input" id="custD" placeholder="Typ Nederlandse betekenis…" value="'+esc(isCustomD?selD:'')+'" style="font-family:Outfit,sans-serif">';
  h+='</div></div>';

  h+='</div>'; // end picker-grid

  // ── ADD OWN WORD ──
  h+='<div class="add-own">';
  h+='<div class="add-own-lbl">✚ Zelf een woord toevoegen aan je lijst</div>';
  h+='<div class="add-own-fields">';
  h+='<div class="field-wrap"><div class="field-lbl">Berbers</div><input type="text" class="field-inp" id="ownT" placeholder="Tarifit woord…"></div>';
  h+='<div class="field-wrap"><div class="field-lbl">Nederlands</div><input type="text" class="field-inp dutch-inp" id="ownD" placeholder="Nederlandse betekenis…"></div>';
  h+='</div>';
  h+='<button class="add-own-btn" id="ownBtn">✚ Toevoegen aan mijn lijst</button>';
  h+='</div>';

  // ── ACTIONS ──
  h+='<div class="cacts">';
  h+='<button class="btn btn-skip" id="bSkip">⊘ Overslaan</button>';
  h+='<button class="btn btn-add" id="bAdd">✓ Keuze opslaan & volgende</button>';
  if(idx>0)h+='<button class="btn btn-nav" id="bPrev">← Vorige</button>';
  if(idx<fg.length-1)h+='<button class="btn btn-nav" id="bNext">Volgende →</button>';
  h+='<span class="nhint">'+(idx+1)+' / '+fg.length+'</span>';
  h+='</div></div>';

  document.getElementById('cardWrap').innerHTML=h;
  const card=document.getElementById('cardWrap');

  // ── WIRE OPT-ROWS ──
  card.querySelectorAll('.opt-row[data-col]').forEach(row=>{
    row.addEventListener('click',()=>{
      const col=row.dataset.col;
      card.querySelectorAll('.opt-row[data-col="'+col+'"], .cust-row[data-col="'+col+'"]').forEach(r=>{
        r.classList.remove('sel');
        const rb=r.querySelector('input[type=radio]');
        if(rb)rb.checked=false;
      });
      row.classList.add('sel');
      row.querySelector('input[type=radio]').checked=true;
    });
  });

  // ── WIRE CUSTOM ROWS ──
  card.querySelectorAll('.cust-row[data-col]').forEach(row=>{
    row.addEventListener('click',e=>{
      if(e.target.tagName==='INPUT'&&e.target.type==='text')return;
      activateCustom(card, row.dataset.col);
    });
    const inp=row.querySelector('.cust-input');
    if(inp){
      inp.addEventListener('focus',()=>activateCustom(card, row.dataset.col));
      inp.addEventListener('input',()=>activateCustom(card, row.dataset.col));
    }
  });

  // ── BUTTONS ──
  card.querySelector('#bAdd').addEventListener('click',()=>doAdd(id,card));
  card.querySelector('#bSkip').addEventListener('click',()=>doSkip(id));
  card.querySelector('#bPrev')?.addEventListener('click',()=>navG(-1));
  card.querySelector('#bNext')?.addEventListener('click',()=>navG(1));

  // ── OWN WORD ──
  card.querySelector('#ownBtn').addEventListener('click',()=>addOwnWord(card));
  card.querySelector('#ownT').addEventListener('keydown',e=>{if(e.key==='Enter')card.querySelector('#ownD').focus();});
  card.querySelector('#ownD').addEventListener('keydown',e=>{if(e.key==='Enter')addOwnWord(card);});

  // Scroll into view
  const li=document.querySelector('[data-id="'+id+'"]');
  if(li)li.scrollIntoView({block:'nearest',behavior:'smooth'});
  renderList();
}

function activateCustom(card, col){
  card.querySelectorAll('.opt-row[data-col="'+col+'"], .cust-row[data-col="'+col+'"]').forEach(r=>{
    r.classList.remove('sel');
    const rb=r.querySelector('input[type=radio]');
    if(rb)rb.checked=false;
  });
  const cr=card.querySelector('.cust-row[data-col="'+col+'"]');
  cr.classList.add('sel');
  cr.querySelector('input[type=radio]').checked=true;
}

function getSel(card, col){
  const cr=card.querySelector('.cust-row[data-col="'+col+'"]');
  if(cr?.classList.contains('sel')){
    return card.querySelector(col==='T'?'#custT':'#custD')?.value.trim()||'';
  }
  const sel=card.querySelector('.opt-row[data-col="'+col+'"].sel');
  return sel?sel.dataset.val:'';
}

function doAdd(id,card){
  const t=getSel(card,'T');
  const d=getSel(card,'D');
  if(!t){toast('⚠ Kies een Berbers woord of typ er een');return;}
  if(!d){toast('⚠ Kies een Nederlandse betekenis of typ er een');return;}
  st.my=st.my.filter(x=>x.id!==id);
  st.my.push({id,t,d});
  st.c[id]={s:'done',t,d};
  ss();upStats();toast('✓ Opgeslagen: '+t+' = '+d);
  const idx=fg.findIndex(x=>x.id===id);
  if(idx<fg.length-1)selGroup(fg[idx+1].id);
  else renderList();
}

function addOwnWord(card){
  const t=card.querySelector('#ownT').value.trim();
  const d=card.querySelector('#ownD').value.trim();
  if(!t||!d){toast('⚠ Vul zowel Berbers als Nederlands in');return;}
  // Add as a new entry with a unique negative id (won't conflict with group ids)
  const customId='own_'+Date.now();
  st.my.push({id:customId,t,d,own:true});
  ss();upStats();
  card.querySelector('#ownT').value='';
  card.querySelector('#ownD').value='';
  toast('✚ Toegevoegd: '+t+' = '+d);
}

function doSkip(id){
  st.c[id]={s:'skip'};
  st.my=st.my.filter(x=>x.id!==id);
  ss();upStats();
  const idx=fg.findIndex(x=>x.id===id);
  if(idx<fg.length-1)selGroup(fg[idx+1].id);
  else if(idx>0)selGroup(fg[idx-1].id);
  else renderList();
}

function navG(dir){
  const idx=fg.findIndex(x=>x.id===cid);
  const n=fg[idx+dir];
  if(n)selGroup(n.id);
}

// Filter chips
document.querySelector('.fbar').addEventListener('click',e=>{
  const chip=e.target.closest('[data-f]');
  if(!chip)return;
  cf=chip.dataset.f;
  document.querySelectorAll('[data-f]').forEach(c=>{
    c.className='chip';
    if(c.dataset.f===cf)c.className='chip on'+(cf==='3'?'3':cf==='2'?'2':cf==='pending'?'P':'');
  });
  cid=null;
  document.getElementById('emptyState').style.display='';
  document.getElementById('cardWrap').style.display='none';
  renderList();
});

document.getElementById('sInp').addEventListener('input',function(){
  sq=this.value;renderList();
  if(sq&&fg.length>0&&fg[0].id!==cid)selGroup(fg[0].id);
});

// Export
function renderMyList(){
  const done=st.my;
  document.getElementById('expSub').textContent=done.length+' woorden in je lijst';
  if(done.length===0){document.getElementById('expPrev').innerHTML='<div class="list-empty">Nog niets toegevoegd.</div>';return;}
  let h='';
  for(let i=0;i<done.length;i++){
    const it=done[i];
    const tag=it.own?'<span class="list-tag">eigen</span>':'';
    h+='<div class="list-row">';
    h+='<span class="list-num">'+(i+1)+'.</span>';
    h+='<span class="list-t">'+esc(it.t)+'</span>';
    h+='<span class="list-d">'+esc(it.d)+'</span>';
    h+=tag;
    h+='<button class="list-del" data-idx="'+i+'" title="Verwijderen">🗑</button>';
    h+='</div>';
  }
  document.getElementById('expPrev').innerHTML=h;
  document.getElementById('expPrev').querySelectorAll('.list-del').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const idx=parseInt(btn.dataset.idx);
      const item=st.my[idx];
      if(item&&typeof item.id==='number'&&st.c[item.id]){delete st.c[item.id];}
      st.my.splice(idx,1);
      ss();upStats();renderList();renderMyList();
      toast('🗑 Verwijderd');
    });
  });
}
function openExport(){
  renderMyList();
  document.getElementById('expModal').classList.add('open');
}
function closeExport(){document.getElementById('expModal').classList.remove('open');}
document.getElementById('expModal').addEventListener('click',e=>{if(e.target===e.currentTarget)closeExport();});

function dl(name,content,type){const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([content],{type}));a.download=name;a.click();}

document.getElementById('exCsv').addEventListener('click',()=>{
  let c='Berbers,Nederlands\n';
  for(const it of st.my)c+='"'+it.t.replace(/"/g,'""')+'","'+it.d.replace(/"/g,'""')+'"\n';
  dl('mijn_tarifit.csv',c,'text/csv');
  toast('📄 CSV gedownload ('+st.my.length+' woorden)');
});
document.getElementById('exAnki').addEventListener('click',()=>{
  let t='#separator:tab\n#html:false\n';
  for(const it of st.my)t+=it.d+'\t'+it.t+'\n';
  dl('mijn_tarifit_anki.txt',t,'text/plain');
  toast('🎴 Anki-bestand gedownload');
});
document.getElementById('exJson').addEventListener('click',()=>{
  const out=st.my.map(it=>({tarifit:it.t,nederlands:it.d,eigen:!!it.own}));
  dl('mijn_tarifit.json',JSON.stringify(out,null,2),'application/json');
  toast('{ } JSON gedownload');
});

function doReset(){
  if(confirm('Alle voortgang en je lijst wissen?')){
    st={c:{},my:[]};ss();cid=null;
    document.getElementById('emptyState').style.display='';
    document.getElementById('cardWrap').style.display='none';
    upStats();renderList();toast('↺ Voortgang gewist');
  }
}

let tTimer;
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  clearTimeout(tTimer);tTimer=setTimeout(()=>t.classList.remove('show'),2600);
}

document.addEventListener('keydown',e=>{
  if(['INPUT','TEXTAREA'].includes(document.activeElement.tagName))return;
  if(e.key==='ArrowDown'||e.key==='j'){e.preventDefault();navG(1);}
  if(e.key==='ArrowUp'||e.key==='k'){e.preventDefault();navG(-1);}
  if(e.key==='Enter'&&cid!==null){
    const card=document.getElementById('cardWrap');
    if(card.style.display!=='none')doAdd(cid,card);
  }
  if(e.key==='s'&&cid!==null)doSkip(cid);
});

ls();upStats();renderList();
</script></body></html>
